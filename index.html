<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0a08" />
  <title>Triad — Prototype v0.3</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- shown if device is in portrait — prompts rotate -->
  <div id="rotate-prompt">
    <div class="rotate-inner">
      <div class="rotate-icon">⟳</div>
      <div class="rotate-text">Rotate device<br/><span>landscape only</span></div>
    </div>
  </div>

  <main id="stage">

    <div class="fog" aria-hidden="true"></div>
    <div class="ember-layer" aria-hidden="true">
      <span class="ember"></span><span class="ember"></span><span class="ember"></span>
      <span class="ember"></span><span class="ember"></span><span class="ember"></span>
      <span class="ember"></span><span class="ember"></span>
    </div>

    <header id="hud">
      <div class="hud-block">
        <span class="hud-label">Turn</span>
        <span class="hud-value" id="turn-num">1</span>
      </div>
      <div class="hud-block hud-resolve">
        <span class="hud-label">Resolve</span>
        <div id="resolve-pips"></div>
      </div>
      <div class="hud-block hud-encounter">
        <span class="hud-label">Reach</span>
        <span class="hud-value" id="encounter-pill">1/3</span>
        <span class="hud-sub" id="encounter-name"></span>
      </div>
      <div class="hud-block hud-title">TRIAD<span class="hud-sub">— prototype v0.3 —</span></div>
    </header>

    <!-- BATTLEFIELD: party stacks on left, enemy cards on right -->
    <section id="battlefield">
      <div id="party-half" aria-label="Party">
        <!-- 3 party stacks (card + 3 tiles) injected, ordered by slot -->
      </div>
      <div id="enemy-half" aria-label="Enemies">
        <!-- 3 enemy cards injected -->
      </div>
    </section>

    <!-- BOTTOM CONTROLS: log | queue+clear+fight | team special -->
    <footer id="control-bar">
      <div id="message-bar" aria-live="polite"></div>
      <div id="queue-area">
        <div id="queue-strip"><!-- queue items injected --></div>
        <button id="btn-clear" class="control-btn"><span class="ctrl-label">Clear</span></button>
        <button id="btn-fight" class="fight-btn" disabled>
          <span class="fight-label">Fight</span>
          <span class="fight-sub">commit turn</span>
        </button>
      </div>
      <div id="ts-area"><!-- team special tile injected --></div>
    </footer>

    <div id="popup-layer"></div>

    <div id="overlay" class="hidden">
      <div id="overlay-content">
        <h2 id="overlay-title">—</h2>
        <p id="overlay-body">—</p>
        <div id="overlay-choices" class="hidden"></div>
        <button id="overlay-btn">Restart</button>
      </div>
    </div>

  </main>

  <script src="game.js"></script>
</body>
</html>
