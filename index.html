<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0a08" />
  <title>KIZUNA | Resonance</title>
  <link rel="stylesheet" href="styles.css?v=144" />
</head>
<body class="on-title">

  <!-- shown if device is in portrait — prompts rotate -->
  <div id="rotate-prompt">
    <div class="rotate-inner">
      <div class="rotate-icon">⟳</div>
      <div class="rotate-text">Rotate device<br/><span>landscape only</span></div>
    </div>
  </div>


  <!-- Full-bleed title screen.  Drawn outside #stage so it covers the whole
       viewport without inheriting the game grid.  Shown/hidden via .hidden. -->
  <div id="title-screen" class="hidden" aria-hidden="true">
    <div class="ts-bg"></div>
    <div class="ts-particles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="ts-content">
      <header class="ts-header">
        <h1 class="ts-title">KIZUNA</h1>
        <p class="ts-subtitle">Resonance</p>
      </header>

      <div class="ts-stage-row">
        <div class="ts-hero" id="ts-hero"></div>
        <div class="ts-fire" aria-hidden="true">
          <div class="ts-sparks">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="ts-flame"></div>
          <div class="ts-flame f2"></div>
          <div class="ts-flame f3"></div>
          <div class="ts-fire-logs"></div>
        </div>
      </div>

      <footer class="ts-footer">
        <nav class="ts-menu" id="ts-menu"></nav>
        <p class="ts-meta" id="ts-meta"></p>
      </footer>
    </div>
  </div>

  <!-- Run-state info panel.  Owns its own root so it doesn't conflict with
       the main #overlay (which holds map / vignette / recruit content).  -->
  <div id="info-panel" class="hidden" aria-hidden="true">
    <div class="ip-bg"></div>
    <div class="ip-card">
      <header class="ip-header">
        <h2 class="ip-title">Run state</h2>
        <button type="button" class="ip-close" id="info-close" aria-label="Close">×</button>
      </header>
      <div class="ip-body" id="info-panel-body"></div>
    </div>
  </div>

  <!-- Boss intro / death overlay.  Hidden by default; populated and shown
       briefly when a boss encounter starts or ends.  Outside #stage so it
       can cover everything. -->
  <div id="boss-intro" class="hidden" aria-hidden="true">
    <div class="bi-bg"></div>
    <div class="bi-content">
      <div class="bi-title-row">
        <span class="bi-rule"></span>
        <span class="bi-eyebrow" id="bi-eyebrow">SIN OF THE DAWN</span>
        <span class="bi-rule"></span>
      </div>
      <div class="bi-name" id="bi-name">THE WAKELING</div>
      <div class="bi-tag" id="bi-tag">It does not flinch.</div>
    </div>
  </div>

  <!-- #stage-scale handles the design-canvas positioning + fit-to-viewport
       transform, so #stage itself stays free for hit-shake animations
       (the shake keyframes would otherwise clobber the scale transform
       and pop the canvas back to its un-scaled top-left position). -->
  <div id="stage-scale">
  <main id="stage">

    <!-- Biome-driven ambient layer.  Class is set via JS to biome-burning,
         biome-bonetide, biome-withered, biome-veiled, biome-fortified, or
         biome-hunger.  Each variant paints its own gradient + particle field. -->
    <div id="biome-layer" class="biome-layer" aria-hidden="true"></div>

    <!-- ambient overlays wrapped in a single absolutely-positioned layer so they
         don't claim grid rows in #stage (browser had been auto-placing them as
         grid items despite position:absolute, squashing the real rows) -->
    <div class="bg-effects" aria-hidden="true">
      <div class="fog"></div>
      <div class="ember-layer">
        <span class="ember"></span><span class="ember"></span><span class="ember"></span>
        <span class="ember"></span><span class="ember"></span><span class="ember"></span>
        <span class="ember"></span><span class="ember"></span>
      </div>
    </div>

    <!-- ROW 1: HUD — run modifier (left), sigil tray (centre/right), menu button (right) -->
    <header id="hud" aria-label="Run state">
      <div id="run-modifier" aria-label="Run modifier"></div>
      <div id="sigil-tray" aria-label="Acquired sigils"></div>
      <button id="info-btn" type="button" title="Menu" aria-label="Open menu">☰</button>
    </header>

    <!-- ROW 2: ATB queue (slim, above battlefield) -->
    <section id="atb-row">
      <div id="queue-strip"></div>
      <button id="btn-clear" class="control-btn" aria-label="Clear queue" title="Clear queue">✕</button>
    </section>

    <!-- ROW 3: BATTLEFIELD — party figures left, enemy figures right -->
    <section id="battlefield">
      <div id="objective-banner" class="hidden" aria-live="polite"></div>
      <div id="party-half" aria-label="Party"></div>
      <div id="enemy-half" aria-label="Enemies"></div>
    </section>

    <!-- ROW 4: ACTION TILES + TEAM SPECIAL + COMMIT CLUSTER (Resolve + Fight) -->
    <section id="action-row">
      <div id="tile-grid"></div>
      <div id="ts-area"></div>
      <div id="commit-zone">
        <div id="resolve-pips" title="Resolve"></div>
        <button id="btn-fight" class="fight-btn" disabled title="Fight — commit turn">
          <svg class="fight-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M 8 5 L 17 12 L 8 19 Z" fill="currentColor"/>
          </svg>
          <span class="fight-label">FIGHT</span>
        </button>
      </div>
    </section>

    <div id="popup-layer"></div>

    <div id="overlay" class="hidden">
      <div id="overlay-content">
        <h2 id="overlay-title">—</h2>
        <p id="overlay-body">—</p>
        <div id="overlay-choices" class="hidden"></div>
        <button id="overlay-btn">Restart</button>
      </div>
    </div>

  </main>
  </div>

  <script src="game.js?v=158"></script>
</body>
</html>
